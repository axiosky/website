<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, follow">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Page not found. The page you're looking for doesn't exist.">
    <title>404 – Page Not Found | Axiosky</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-black: #0a0a0a;
            --color-white: #ffffff;
            --color-slate-200: #e2e8f0;
            --color-primary: #2C5282;
            --font-family-base: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { height: 100%; }
        body {
            width: 100%; height: 100%;
            font-family: var(--font-family-base);
            background-color: var(--color-black);
            color: var(--color-white);
            display: flex; align-items: center; justify-content: center;
            padding: 20px;
        }
        .container-404 {
            text-align: center; max-width: 600px; width: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 24px;
        }
        .gradient-text {
            display: block;
            font-size: clamp(10rem, 20vw, 20rem);
            font-weight: 300; line-height: 1;
            background: linear-gradient(to bottom, rgba(255,255,255,1) 0%, rgba(0,0,0,0.75) 75%);
            -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
            font-family: 'IBM Plex Sans', monospace;
        }
        .error-text { font-size: 18px; font-weight: 600; line-height: 1.6; color: var(--color-white); letter-spacing: 0.5px; }
        .btn-home {
            display: inline-flex; align-items: center; gap: 8px;
            background: none; border: none;
            color: var(--color-slate-200); text-decoration: none; font-size: 16px; font-weight: 600;
            cursor: pointer; transition: all 250ms cubic-bezier(0.16,1,0.3,1);
            font-family: var(--font-family-base); justify-content: center; opacity: 0.8;
        }
        .btn-home:hover { opacity: 1; }
        @media (max-width: 768px) {
            .gradient-text { font-size: clamp(6rem, 15vw, 12rem); }
            .error-text { font-size: 16px; }
            .btn-home { font-size: 15px; }
            .container-404 { gap: 16px; }
        }
    </style>
</head>
<body>
    <div class="container-404">
        <span class="gradient-text">404</span>
        <p class="error-text">Page Not Found</p>
        <a href="/" class="btn-home">Go to Homepage</a>
    </div>
</body>
</html>
